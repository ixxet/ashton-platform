<style>
#erd { padding: 0.5rem 0; overflow-x: auto; }
#erd svg { max-width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  er: { useMaxWidth: true, layoutDirection: 'TB' },
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  facilities ||--o{ checkin_events : tracks
  facilities {
    uuid id PK
    text name UK
    int capacity
    timestamptz created_at
  }
  checkin_events {
    uuid id PK
    uuid facility_id FK
    text student_id
    text direction
    text source
    timestamptz recorded_at
    jsonb metadata
  }

  rooms ||--o{ bookings : has
  rooms {
    uuid id PK
    text name
    int capacity
    jsonb features
  }
  bookings {
    uuid id PK
    uuid room_id FK
    text booked_by
    text reason
    timestamptz starts_at
    timestamptz ends_at
    text status
  }

  equipment ||--o{ maintenance_tickets : has
  equipment {
    uuid id PK
    text name
    text location
    text status
    timestamptz last_serviced
    jsonb metadata
  }
  maintenance_tickets {
    uuid id PK
    uuid equipment_id FK
    text reported_by
    text description
    text priority
    text status
    timestamptz resolved_at
  }

  users ||--o{ workouts : logs
  users ||--o{ ares_ratings : has
  users {
    uuid id PK
    text student_id UK
    text display_name
    text email
    jsonb preferences
  }
  workouts ||--|{ exercises : contains
  workouts {
    uuid id PK
    uuid user_id FK
    timestamptz logged_at
    text notes
    jsonb metadata
  }
  exercises {
    uuid id PK
    uuid workout_id FK
    text name
    int sets
    int reps
    numeric weight_kg
    numeric rpe
  }

  users ||--o{ recommendations : receives
  recommendations {
    uuid id PK
    uuid user_id FK
    jsonb content
    text model_used
    int latency_ms
    text feedback
  }

  ares_ratings {
    uuid id PK
    uuid user_id FK
    text activity
    numeric mu
    numeric sigma
    int games_played
  }
  users ||--o{ ares_match_players : plays_in
  ares_matches ||--|{ ares_match_players : includes
  ares_matches {
    uuid id PK
    text activity
    text match_type
    timestamptz played_at
    jsonb metadata
  }
  ares_match_players {
    uuid match_id FK
    uuid user_id FK
    int team
    text outcome
    numeric mu_before
    numeric mu_after
  }

  audit_log {
    bigint id PK
    text actor
    text action
    jsonb target
    jsonb metadata
    timestamptz created_at
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
